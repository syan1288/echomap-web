<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Echo Map</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=Gasoek+One&family=Nunito:wght@500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Roboto:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Roboto+Mono:wght@400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""></script>
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>

    <style>
      body {
        font-family: 'Plus Jakarta Sans', 'Helvetica Neue', system-ui, sans-serif;
        overflow-x: hidden;
        min-height: 100dvh;
      }
      .leaflet-control-attribution {
        display: none !important; /* Hide for a cleaner prototype look */
      }
      @keyframes fadeInOut {
        0%, 100% { opacity: 0; transform: translateY(-20px) translateX(-50%); }
        10%, 90% { opacity: 1; transform: translateY(0) translateX(-50%); }
      }
      .animate-toast {
        animation: fadeInOut 5s ease-in-out forwards;
      }
      /* 主栏纵向滑动隐藏滚动条，仍可用滚轮 / 触控滑动 */
      .scrollbar-hide {
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
        width: 0;
        height: 0;
      }
      /* 侧栏品牌白云：横向漂移 + 轻微上下浮动，透明度随动画略变 */
      @keyframes echoCloudFloat {
        0% { transform: translate(-12%, 0); opacity: 0.675; }
        35% { transform: translate(18%, -5px); opacity: 1; }
        70% { transform: translate(42%, 3px); opacity: 0.8625; }
        100% { transform: translate(58%, 0); opacity: 0.75; }
      }
      @keyframes echoCloudFloatSlow {
        0% { transform: translate(8%, 4px); opacity: 0.55; }
        50% { transform: translate(-6%, -8px); opacity: 1; }
        100% { transform: translate(22%, 2px); opacity: 0.625; }
      }
      @keyframes echoCloudFloatSoft {
        0% { transform: translate(30%, -4px); opacity: 0.4375; }
        45% { transform: translate(8%, 6px); opacity: 0.825; }
        100% { transform: translate(-4%, -2px); opacity: 0.5125; }
      }
      .echo-cloud-a {
        animation: echoCloudFloat 13.2s ease-in-out infinite;
      }
      .echo-cloud-b {
        animation: echoCloudFloatSlow 16.8s ease-in-out infinite;
        animation-delay: -3.6s;
      }
      .echo-cloud-c {
        animation: echoCloudFloatSoft 20.4s ease-in-out infinite;
        animation-delay: -8.4s;
      }
      /* 超大 / 特小云：与 a–c 节奏区分 */
      @keyframes echoCloudFloatXL {
        0%, 100% { transform: translate(-4%, 2%); }
        40% { transform: translate(6%, -4px); }
      }
      @keyframes echoCloudFloatTiny {
        0% { transform: translate(0, 0) scale(1); opacity: 0.4375; }
        40% { transform: translate(-6px, 5px) scale(1.06); opacity: 0.675; }
        100% { transform: translate(4px, -3px) scale(1); opacity: 0.475; }
      }
      @keyframes echoCloudFloatMeander {
        0% { transform: translate(2%, 0); opacity: 0.3625; }
        50% { transform: translate(-8%, 6px); opacity: 0.6; }
        100% { transform: translate(4%, -2px); opacity: 0.375; }
      }
      .echo-cloud-xl {
        animation: echoCloudFloatXL 22.8s ease-in-out infinite;
      }
      .echo-cloud-tiny {
        animation: echoCloudFloatTiny 9.6s ease-in-out infinite;
        animation-delay: -1.8s;
      }
      .echo-cloud-meander {
        animation: echoCloudFloatMeander 15.6s ease-in-out infinite;
        animation-delay: -5.4s;
      }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.1.1/",
    "react": "https://aistudiocdn.com/react@^19.1.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.15.0",
    "tone": "https://aistudiocdn.com/tone@^15.0.4"
  }
}
</script>
</head>
<body class="bg-white">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
